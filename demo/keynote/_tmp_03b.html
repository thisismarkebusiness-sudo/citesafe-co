<!DOCTYPE html><html><head><meta charset=utf-8>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{width:1920px;height:1080px;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#0f172a}
.w{background:#fafafa;width:100%;height:100%;position:relative}
.b{background:#05070c;width:100%;height:100%;position:relative;color:#f8fafc}
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;width:90%}
.h{font-size:72px;font-weight:600;letter-spacing:-.045em;line-height:1.08}
.h2{font-size:56px;font-weight:600;letter-spacing:-.04em;line-height:1.1}
.sub{font-size:28px;font-weight:500;color:#64748b;margin-top:20px;letter-spacing:-.02em}
.dim{color:#94a3b8}
.blue{color:#2563eb}
.green{color:#16a34a}
.red{color:#dc2626}
.tiny{font-size:14px;font-weight:650;letter-spacing:.22em;text-transform:uppercase;color:#94a3b8;margin-bottom:24px}
.tiny-w{font-size:14px;font-weight:650;letter-spacing:.22em;text-transform:uppercase;color:rgba(148,163,184,.9);margin-bottom:24px}
.window{width:1040px;background:#fff;border-radius:20px;box-shadow:0 40px 100px rgba(15,23,42,.12),0 0 0 1px rgba(15,23,42,.06);overflow:hidden;margin:0 auto}
.bar{height:44px;background:#f8fafc;border-bottom:1px solid #eef2f7;display:flex;align-items:center;padding:0 16px;gap:8px}
.dot{width:10px;height:10px;border-radius:50%}
.d1{background:#ff5f57}.d2{background:#febc2e}.d3{background:#28c840}
.url{margin-left:12px;font-size:13px;color:#64748b;font-weight:500}
.body{padding:32px 36px 40px}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center}
.mark svg{width:22px;height:22px}
.brand{font-size:20px;font-weight:650;letter-spacing:-.03em}
.brand span{color:#2563eb}
.ta{border:1px solid #e2e8f0;border-radius:14px;padding:18px 20px;font-size:16px;line-height:1.55;color:#0f172a;background:#f8fafc;min-height:88px}
.card{border:1px solid #e2e8f0;border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;gap:12px;align-items:flex-start;background:#fff}
.card .meta{font-size:12px;font-weight:700;margin-top:4px}
.card .cite{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;font-weight:600}
.ok{color:#16a34a}.warn{color:#d97706}.bad{color:#dc2626}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;background:#ecfdf5;color:#16a34a;margin:8px 8px 0 0}
.pills{margin-top:16px;text-align:left}
.float{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%) scale(0.98)}
</style>
<style>body{background:transparent}</style>
</head><body><div class="w"><div class=float>
  <div class=window>
    <div class=bar><span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span><span class=url>citesafe.co · Scout 1.0</span></div>
    <div class=body>
      <div style="font-size:15px;font-weight:650;margin-bottom:8px">3 citations found</div>
      <div class=card><div style="width:10px;height:10px;border-radius:50%;background:#16a34a;margin-top:6px"></div><div><div class=cite>Brown v. Board of Education, 347 U.S. 483 (1954)</div><div class="meta ok">Verified · 98%</div></div></div>
      <div class=card><div style="width:10px;height:10px;border-radius:50%;background:#16a34a;margin-top:6px"></div><div><div class=cite>Loving v. Virginia, 388 U.S. 1 (1967)</div><div class="meta ok">Verified · 97%</div></div></div>
      <div class=card style="border-color:#fecaca;background:#fffafa"><div style="width:10px;height:10px;border-radius:50%;background:#dc2626;margin-top:6px"></div><div><div class=cite>Smith v. Imaginary Holdings, 999 F.99 1 (2099)</div><div class="meta bad">Could Not Verify · fabrication risk</div></div></div>
    </div>
  </div>
</div></div></body></html>
